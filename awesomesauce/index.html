<body class="notebook">
  <div id="app"></div>
  <script src="../page-layout.js"></script>
  <script>
    // Edit this list to add posts / notes / essays.
    const posts = [
      {
        title: "All the Deets on DRTs (so far)",
        date: "May 2026",
        excerpt: "A tour through defense-associated reverse transcriptases, where they came from, why they matter, and how much we DON'T know...",
        link: "#",
        tilt: -0.6
      },
      {
        title: "Cas13 is Pretty Cool",
        date: "April 2026",
        excerpt: "An RNA-targeting CRISPR system with weird collateral activity, transcriptome-scale potential, and the potential to reveal the secrets of the dark genome...",
        link: "#",
        tilt: 0.7
      },
      {
        title: "Oh, All The Places That dCas Will Go!",
        date: "March 2026",
        excerpt: "Catalytically dead Cas proteins are key to all sorts of different genetic payloads, reengineering programmable DNA targeting into a platform for regulation, imaging, editing, and so much more!",
        link: "#",
        tilt: -0.4
      },
      {
        title: "So, What Even Is CRISPR?",

        link: "#",
        tilt: 0.5
      },
    ];

    const previews = posts.map(p =>
      PaperPanel({
        title: p.title,
        meta: p.date,
        tilt: p.tilt,
        body: `<p>${p.excerpt}</p>`,
        footer: `<a class="paper-link" href="${p.link}">read more &rarr;</a>`
      })
    ).join("");

    document.getElementById("app").innerHTML = NotebookPageLayout({
      title: "Awesomesauce",
      subtitle: "things I'm learning about!",
      children: previews
    });
  </script>

</html>
